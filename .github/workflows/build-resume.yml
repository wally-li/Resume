name: Build Resume

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "data/resume.frontend.md"
      - "assets/avatar-resume.jpg"
      - "package.json"
      - "package-lock.json"
      - "scripts/build-pdf.sh"
      - "scripts/build-resume.mjs"
      - "styles/**"
      - ".github/workflows/build-resume.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build resume
        run: npm run build

      - name: Upload resume artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resume-export
          path: |
            exports/*.html
            exports/*.pdf
